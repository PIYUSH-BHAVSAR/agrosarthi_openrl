name: AgroSarthiEnv
version: "1.0.0"
description: >
  A reinforcement learning environment simulating agricultural decision-making
  across a full crop growing season. The agent manages soil nutrients, irrigation,
  disease response, and task execution across 5 cultivation stages to maximise yield.

interface:
  observation:
    type: object
    properties:
      N:
        type: number
        description: Nitrogen content in soil (kg/ha)
      P:
        type: number
        description: Phosphorus content in soil (kg/ha)
      K:
        type: number
        description: Potassium content in soil (kg/ha)
      ph:
        type: number
        description: Soil pH level
      temperature:
        type: number
        description: Ambient temperature (degrees C)
      rainfall:
        type: number
        description: Cumulative moisture level (mm)
      stage:
        type: integer
        description: "Cultivation stage: 0=LandPrep 1=Sowing 2=Vegetative 3=Flowering 4=Harvest"
      tasks_done:
        type: integer
        description: Number of tasks completed in current stage
      disease_active:
        type: integer
        description: "Disease flag: 0=healthy 1=disease present"
      crop_index:
        type: integer
        description: "Selected crop index (0=none, 1-21=crop)"

  action:
    type: object
    properties:
      action_type:
        type: string
        enum:
          - SELECT_CROP
          - APPLY_FERTILIZER
          - IRRIGATE
          - AMEND_PH
          - COMPLETE_TASK
          - ADVANCE_STAGE
          - APPLY_TREATMENT
          - WAIT
      crop_index:
        type: integer
        description: Required for SELECT_CROP
      n_delta:
        type: number
        description: Nitrogen to add (kg/ha)
      p_delta:
        type: number
        description: Phosphorus to add (kg/ha)
      k_delta:
        type: number
        description: Potassium to add (kg/ha)
      irrigation_mm:
        type: number
        description: Water to add (mm)
      ph_delta:
        type: number
        description: pH adjustment amount
      task_index:
        type: integer
        description: Task index to complete in current stage

  reward:
    type: number
    description: >
      Step-wise reward signal. Positive for good decisions, negative for
      poor ones. Final score normalized to (0, 1).

tasks:
  - name: easy
    grader: agrosarthi_rl_env.grader:grade_easy
    description: >
      Select the most suitable crop for the given soil and weather conditions.
      The agent must identify and choose the optimal crop within limited steps,
      demonstrating agronomic knowledge of crop-soil compatibility.

  - name: medium
    grader: agrosarthi_rl_env.grader:grade_medium
    description: >
      Prepare degraded soil and complete all critical early-stage farming tasks
      efficiently. The agent must amend soil conditions, select a crop, and
      execute high-priority tasks in Land Preparation and Sowing stages before
      advancing, reflecting real-world farm planning discipline.

  - name: hard
    grader: agrosarthi_rl_env.grader:grade_hard
    description: >
      Manage a complete crop lifecycle across all 5 cultivation stages under
      resource constraints, stochastic disease events, and climate shocks.
      The agent must balance fertilizer budgets, respond to disease outbreaks,
      complete stage tasks, and maximise final yield — simulating a full
      agricultural season under realistic pressure.
