name: AgroSarthiEnv
version: "1.0.0"
description: >
  A reinforcement learning environment simulating agricultural decision-making
  across a crop season, including soil management, disease handling, and
  environmental uncertainty.

interface:
  observation:
    type: object
    properties:
      N:
        type: number
      P:
        type: number
      K:
        type: number
      pH:
        type: number
      stage:
        type: integer
      moisture:
        type: number
      disease_risk:
        type: number

  action:
    type: object
    properties:
      action_type:
        type: string
        enum:
          - select_crop
          - apply_fertilizer
          - irrigate
          - amend_ph
          - complete_task
          - advance_stage
          - apply_treatment
          - wait
      crop_index:
        type: integer
      n_delta:
        type: number
      p_delta:
        type: number
      k_delta:
        type: number
      irrigation_mm:
        type: number
      task_index:
        type: integer

  reward:
    type: number

tasks:
  - name: easy
    description: Select the optimal crop based on soil conditions.
    difficulty: easy

  - name: medium
    description: Optimize soil and complete stage tasks.
    difficulty: medium

  - name: hard
    description: Full-season planning with disease and environmental events.
    difficulty: hard